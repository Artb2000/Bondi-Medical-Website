services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - PUBLIC_HOTDOC_EMBED_URL=${PUBLIC_HOTDOC_EMBED_URL}
        - PUBLIC_GA_MEASUREMENT_ID=${PUBLIC_GA_MEASUREMENT_ID}
    restart: unless-stopped
    networks:
      - public

  caddy:
    image: caddy:2.9-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    networks:
      - public

volumes:
  caddy_data:
  caddy_config:

networks:
  public:
    driver: bridge
