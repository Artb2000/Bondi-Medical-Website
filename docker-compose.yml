services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - PUBLIC_HOTDOC_EMBED_URL=${PUBLIC_HOTDOC_EMBED_URL}
        - PUBLIC_GA_MEASUREMENT_ID=${PUBLIC_GA_MEASUREMENT_ID}
        - SITE_URL=${SITE_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:4321"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - public

  caddy:
    image: caddy:2.9-alpine
    restart: unless-stopped
    environment:
      - SITE_DOMAIN=${SITE_DOMAIN}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - public

volumes:
  caddy_data:
  caddy_config:

networks:
  public:
    driver: bridge
